name: Skill checks

on:
  push:
  pull_request:

jobs:
  run-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run skill checks
        run: python scripts/run_checks.py
